<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME.LIVE | Terminal</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; height: 100%; width: 100%; display: flex; justify-content: center; align-items: center; }
        
        #landing-page { text-align: center; display: block; }
        h1 { color: #fff; letter-spacing: 10px; font-size: 2.5rem; text-shadow: 0 0 15px #00ff41; margin-bottom: 30px; }
        
        .enter-btn { 
            padding: 15px 40px; background: rgba(0, 20, 50, 0.3); border: 2px solid #00ff41; 
            color: #00ff41; cursor: pointer; text-transform: uppercase; font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5); transition: 0.3s;
        }
        .enter-btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 25px #00ff41; }

        #terminal-interface { display: none; width: 100%; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1>ENGAGEME.LIVE</h1>
        <button class="enter-btn" onclick="activateTerminal()">ENTER TERMINAL</button>
    </div>

    <div id="terminal-interface">
        <div style="border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 10px;">
            SYS: PHANTOM PRINCE | STATUS: SECURE
        </div>
        <div style="flex-grow: 1; border: 1px solid #333; background: #000; color: #444; display: flex; justify-content: center; align-items: center;">
            [ CHART AREA LOADING... ]
        </div>
        <div style="margin-top: 10px; color: #f0f; font-size: 0.9rem;">
            > SUN: 112.65 [ INDICATIVE ]
        </div>
    </div>

    <script>
        function activateTerminal() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('terminal-interface').style.display = 'flex';
            console.log("Terminal Activated.");
        }
    </script>
</body>
</html>
