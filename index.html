<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHANTOM PRINCE | TERMINAL</title>
    <style>
        body { 
            background: #000; color: #00FF41; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden; text-transform: uppercase;
        }
        /* PAGE 1: SPLASH */
        #page-one { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; width: 100%; position: absolute; z-index: 100; background: #000; 
        }
        /* PAGE 2: TERMINAL */
        #page-two { 
            display: none; flex-direction: column; height: 100vh; width: 100%; 
        }
        .enter-btn { 
            border: 2px solid #00FF41; padding: 20px 40px; color: #00FF41; 
            font-size: 24px; cursor: pointer; background: transparent; font-weight: bold; 
        }
        header { padding: 15px; border-bottom: 2px solid #00FF41; text-align: center; font-weight: bold; }
        
        /* THE CHART FIX: NO SCRIPTS, JUST THE RAW FRAME */
        .chart-window { flex-grow: 1; width: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        footer { padding: 15px; border-top: 2px solid #00FF41; display: flex; justify-content: space-around; background: #050505; }
        .pink { color: #FF00FF; }
    </style>
</head>
<body>

    <div id="page-one">
        <h1 style="letter-spacing: 10px;">PHANTOM PRINCE</h1>
        <p style="color: #444; margin-bottom: 30px;">WTI CRUDE PROTOCOL</p>
        <button class="enter-btn" onclick="document.getElementById('page-one').style.display='none'; document.getElementById('page-two').style.display='flex';">ENTER TERMINAL</button>
    </div>

    <div id="page-two">
        <header>SYS: PHANTOM PRINCE // ACTIVE MONITOR</header>
        <div class="chart-window">
            <iframe src="s.tradingview.com/widgetembed/?symbol=TVC%3AUSOIL&interval=60&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&theme=dark&style=1&timezone=Etc%2FUTC&locale=en" allowfullscreen></iframe>
        </div>
        <footer>
            <div>THU: 112.06</div>
            <div>FRI: 112.25</div>
            <div class="pink">SUN PRINT: 112.65</div>
        </footer>
    </div>

</body>
</html>
