<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <h1>ENGAGEME.LIVE SYSTEM ONLINE</h1>
        <canvas id="chartCanvas" width="600" height="400"></canvas>
        <div class="controls">
            <button onclick="updateTimeframe('1M')">1M</button>
            <button onclick="updateTimeframe('5M')">5M</button>
            <button onclick="updateTimeframe('1H')">1H</button>
            <button onclick="updateTimeframe('1D')">1D</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
