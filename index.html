<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline';">
    <title>Terminal V3.5 | API Sync</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { height: 50px; background: #111; border-bottom: 2px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chart-container { height: calc(100vh - 50px); width: 100%; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 5px; text-transform: uppercase; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div>SYSTEM STATUS: ONLINE // API MATCHED</div>
    <div class="controls">
        <input type="text" id="tickerInput" placeholder="ENTER TICKER">
        <button id="syncBtn">SYNC DATA & CHART</button>
    </div>
</div>
<div id="chart-container"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
    // 1. PASTE YOUR NEW DEPLOYMENT URL BETWEEN THE QUOTES BELOW
    const googleUrl = "https://script.google.com/macros/s/AKfycbxYSKyPjur9E5JmjnoDuUeUt3VZH5CNnaznH0haXg_m58WHjhrl8pFMSNjn_cKJwZ-q/exec";

    function drawChart(symbol, floor, ceiling) {
        document.getElementById("chart-container").innerHTML = "";
        const widget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "theme": "dark",
            "container_id": "chart-container",
            "extended_hours": true,
            "timezone": "Etc/UTC"
        });

        setTimeout(() => {
            if (widget && widget.chart) {
                try {
                    // Draw Floor
                    if (floor > 0) {
                        widget.chart().createShape({
                            price: floor, shape: 'horizontal_line', lock: true,
                            overrides: { linecolor: '#00ff00', linewidth: 3, showLabel: true, text: "FLOOR: $" + floor }
                        });
                    }
                    // Draw Ceiling
                    if (ceiling > 0) {
                        widget.chart().createShape({
                            price: ceiling, shape: 'horizontal_line', lock: true,
                            overrides: { linecolor: '#ff00ff', linewidth: 2, showLabel: true, text: "CEILING: $" + ceiling }
                        });
                    }
                } catch (e) { console.log("Engine warming up..."); }
            }
        }, 2500); // 2.5 second wait for the "handshake"
    }

    async function sync() {
        const t = document.getElementById('tickerInput').value.toUpperCase().trim();
        if (!t) return;

        try {
            // Read one ticker (Claude's Line 2)
            const res = await fetch(googleUrl + "?ticker=" + t + "&cache=" + new Date().getTime());
            const data = await res.json();

            // Claude's script returns either the full object or the ticker key
            const row = data[t] || data;

            if (row && (row.floor || row.ceiling)) {
                drawChart(t, parseFloat(row.floor), parseFloat(row.ceiling));
            } else {
                // Add new ticker (Claude's Line 3)
                fetch(googleUrl + "?action=add&ticker=" + t, { mode: 'no-cors' });
                drawChart(t, 0, 0);
                alert("TICKER ADDED. WAIT 5 SECON
