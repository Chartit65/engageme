<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM PRINCE | WTI TERMINAL</title>
    <style>
        body { 
            background: #000; color: #00FF41; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden; text-transform: uppercase;
        }
        #landing { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .enter-btn { border: 2px solid #00FF41; padding: 20px 40px; color: #00FF41; font-size: 1.5em; cursor: pointer; background: none; }
        #terminal { display: none; flex-direction: column; height: 100vh; }
        header { padding: 10px; border-bottom: 2px solid #00FF41; text-align: center; font-size: 20px; font-weight: bold; }
        
        /* THE CHART FRAME */
        .chart-container { flex-grow: 1; border-bottom: 2px solid #00FF41; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .footer-ticker { padding: 15px; background: #050505; }
        .data-row { font-size: 16px; font-weight: bold; margin: 4px 0; letter-spacing: 1px; }
        .pink { color: #FF00FF; }
        .cyan { color: #00FFFF; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 15px; font-size: 45px;">PHANTOM PRINCE</h1>
        <button class="enter-btn" onclick="runTerminal()">ENTER TERMINAL</button>
    </div>

    <div id="terminal">
        <header>SYS: PHANTOM PRINCE // LIVE WTI FEED</header>
        
        <div class="chart-container">
            <iframe src="s.tradingview.com/widgetembed/?frameElementId=tradingview_762ae&symbol=TVC:USOIL&interval=60&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark&style=1&timezone=Etc%2FUTC&studies_overrides={}&overrides={}&enabled_features=[]&disabled_features=[]&locale=en&utm_source=engageme.live&utm_medium=widget&utm_campaign=chart&utm_term=TVC:USOIL"></iframe>
        </div>

        <div class="footer-ticker">
            <div class="data-row">THU: 112.06 | FRI: 112.25</div>
            <div class="data-row pink">SUN PRINT: 112.65</div>
            <div class="data-row cyan">LIVE MONITOR: ACTIVE</div>
        </div>
    </div>

    <script>
        function runTerminal() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('terminal').style.display = 'flex';
        }
    </script>
</body>
</html>
