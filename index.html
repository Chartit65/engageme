<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal V3.3 | Security Bypass</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { height: 50px; background: #111; border-bottom: 2px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chart-container { height: calc(100vh - 50px); width: 100%; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 5px; text-transform: uppercase; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">
    <div>SYSTEM STATUS: ONLINE // CSP BYPASS ACTIVE</div>
    <div class="controls">
        <input type="text" id="tickerInput" placeholder="ENTER TICKER">
        <button id="syncBtn">SYNC DATA & CHART</button>
    </div>
</div>
<div id="chart-container"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script type="text/javascript">
    const googleUrl = "https://script.google.com/macros/s/AKfycbwcWhXEgq_o7vNiRn09YKxsJCe4QNYPtEs0IU1zX6RB_R3ELJKF7kFUYsKza8mHz1hU/exec";

    function runTerminal(symbol, f, c) {
        // Clear old chart
        const container = document.getElementById("chart-container");
        container.innerHTML = "";

        // Create the new widget
        const widget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "theme": "dark",
            "container_id": "chart-container",
            "extended_hours": true,
            "timezone": "Etc/UTC",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true
        });

        // The "Bypass" logic: Wait for the object to exist without using the 'onReady' trigger
        var checkExist = setInterval(function() {
            if (typeof widget !== 'undefined' && widget.chart) {
                try {
                    if (f > 0) {
                        widget.chart().createShape({
                            price: f, shape: 'horizontal_line', lock: true,
                            overrides: { linecolor: '#00ff00', linewidth: 3, showLabel: true, text: "FLOOR: " + f }
                        });
                    }
                    if (c > 0) {
                        widget.chart().createShape({
                            price: c, shape: 'horizontal_line', lock: true,
                            overrides: { linecolor: '#ff00ff', linewidth: 2, showLabel: true, text: "CEILING: " + c }
                        });
                    }
                    clearInterval(checkExist); // Stop checking once drawn
                } catch (e) {
                    // Still loading...
                }
            }
        }, 500); // Check every 0.5 seconds
    }

    async function sync() {
        const t = document.getElementById('tickerInput').value.toUpperCase().trim();
        if (!t) return;

        try {
            const res = await fetch(googleUrl);
            const data = await res.json();
            const stock = data[t] || { floor: 0, ceiling: 0 };
            runTerminal(t, parseFloat(stock.floor), parseFloat(stock.ceiling));
        } catch (e) {
            console.error("Data Fetch Failed:", e);
            runTerminal(t, 0, 0);
        }
    }

    document.getElementById('syncBtn').onclick = sync;
    window.onload = () => runTerminal("PRCH", 0, 0);
</script>
</body>
</html>
