<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Intelligence Terminal | Floor Analysis</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { height: 50px; background: #111; border-bottom: 2px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chart-container { height: calc(100vh - 50px); width: 100%; }
        .controls { display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 5px; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>

<div id="header">
    <div>SYSTEM STATUS: ACTIVE // TERMINAL_01</div>
    <div class="controls">
        <input type="text" id="tickerInput" placeholder="ENTER TICKER (e.g. BTM)" style="text-transform:uppercase">
        <button onclick="syncData()">SYNC DATA & CHART</button>
    </div>
</div>

<div id="chart-container" id="tv-chart"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
    // PASTE YOUR GOOGLE DEPLOYMENT URL HERE
    const googleUrl = "https://script.google.com/macros/s/AKfycbyRm0lzz-MRqnZVnYcy644oer4r-1ZbVGftx4TWquxE91rYswCGepwU4ONnIYQHyrFC/exec";

    let widget;

    function initChart(symbol = "NASDAQ:BTM", anchorPrice = null) {
        widget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "save_image": false,
            "container_id": "chart-container",
            "overrides": {
                "mainSeriesProperties.paneProperties.topMargin": 20,
                "mainSeriesProperties.paneProperties.bottomMargin": 20
            }
        });
    }

    // Initialize on start
    initChart();

    async function syncData() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase();
        if (!ticker) return alert("Enter a ticker symbol.");

        try {
            const response = await fetch(googleUrl);
            const data = await response.json();
            
            // Search the data for the ticker
            const row = data.find(r => r.Ticker && r.Ticker.toUpperCase() === ticker);

            if (row) {
                const floorPrice = parseFloat(row.FloorPrice);
                const purpleLine = parseFloat(row.PurpleLine);

                // GHOST CANDLE LOGIC: Snap chart to Floor Price
                initChart(ticker, floorPrice);

                widget.onChartReady(() => {
                    // Create the Green Floor Line
                    widget.chart().createShape({
                        price: floorPrice,
                        shape: 'horizontal_line',
                        lock: true,
                        overrides: {
                            linecolor: '#00ff00',
                            linewidth: 3,
                            showLabel: true,
                            text: "GREEN FLOOR: " + floorPrice
                        }
                    });

                    // Create the Purple Dilution Line
                    widget.chart().createShape({
                        price: purpleLine,
                        shape: 'horizontal_line',
                        lock: true,
                        overrides: {
                            linecolor: '#ff00ff',
                            linewidth: 2,
                            showLabel: true,
                            text: "PURPLE LIMIT: " + purpleLine
                        }
                    });
                });

                alert("SYSTEM SYNCED: " + ticker + " Precision Data Loaded.");
            } else {
                alert("Ticker " + ticker + " not found in Sheet.");
            }
        } catch (err) {
            console.error(err);
            alert("Connection Error. Check Google URL and Permissions.");
        }
    }
</script>

</body>
</html>
