<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>engagement.live | Functional Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* SECTION 1: LANDING */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 10px; }
        h1 span { color: #007bff; }
        .mission { font-size: 1.4rem; color: #bbb; margin-bottom: 40px; }
        
        .cta-button {
            background-color: #007bff;
            color: white;
            padding: 18px 50px;
            font-size: 1.1rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            border: 1px solid #007bff;
            transition: 0.3s;
        }
        .cta-button:hover { background: transparent; color: #007bff; }

        /* SECTION 2: TOOLS DIRECTORY */
        .tools-section {
            min-height: 100vh;
            padding: 80px 20px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2.section-title { font-size: 2.5rem; color: #007bff; margin-bottom: 40px; }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .tool-card {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }
        .tool-card:hover { border-color: #007bff; background: #161616; transform: translateY(-5px); }
        .tool-card h3 { color: #007bff; margin-bottom: 15px; font-size: 1.5rem; }
        .tool-card p { color: #ccc; line-height: 1.6; font-size: 0.95rem; }
        .status { display: block; margin-top: 20px; font-size: 0.75rem; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>engage me<span>.live</span></h1>
        <p class="mission">Functional Tools for the Real World</p>
        <a href="#the-exchange" class="cta-button">Access Tools</a>
    </section>

    <section id="the-exchange" class="tools-section">
        <h2 class="section-title">The Exchange</h2>
        <div class="tool-grid">
            
            <a href="oil-tool-link.html" class="tool-card">
                <h3>WTI Shadow Terminal</h3>
                <p>Advanced real-time tracking for crude oil volatility. Optimized for WTI/USO technical analysis.</p>
                <span class="status">● SYSTEM LIVE</span>
            </a>

            <div class="tool-card" style="opacity: 0.4;">
                <h3>Next Tool</h3>
                <p>Future utility pending integration. System offline.</p>
                <span class="status" style="color: #666;">○ OFFLINE</span>
            </div>

        </div>
    </section>

</body>
</html>
