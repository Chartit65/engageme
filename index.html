<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM PRINCE | WTI HUB</title>
    <style>
        body { 
            background: #000; color: #00FF41; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden; text-transform: uppercase;
        }
        /* PAGE 1: THE GATE */
        #portal {
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;
            position: absolute; width: 100%; z-index: 10; background: #000;
        }
        .enter-btn { 
            border: 2px solid #00FF41; padding: 25px 50px; color: #00FF41; 
            font-size: 1.8em; cursor: pointer; background: #000; transition: 0.3s;
            letter-spacing: 5px; font-weight: bold;
        }
        .enter-btn:hover { background: #00FF41; color: #000; box-shadow: 0 0 30px #00FF41; }

        /* PAGE 2: THE MONITOR */
        #hub {
            display: flex; flex-direction: column; height: 100vh; visibility: hidden;
        }
        header { padding: 15px; border-bottom: 2px solid #00FF41; text-align: center; font-size: 20px; font-weight: bold; }
        
        .viewer { flex-grow: 1; background: #000; border-bottom: 2px solid #00FF41; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .footer-ticker { padding: 15px; background: #050505; display: flex; justify-content: space-around; }
        .data-row { font-size: 14px; font-weight: bold; }
        .pink { color: #FF00FF; }
    </style>
</head>
<body>

    <div id="portal">
        <h1 style="letter-spacing: 15px; font-size: 45px; margin-bottom: 10px;">PHANTOM PRINCE</h1>
        <p style="color: #444; margin-bottom: 50px; letter-spacing: 2px;">WTI CRUDE PROTOCOL // 1965</p>
        <button class="enter-btn" onclick="revealHub()">ENTER TERMINAL</button>
    </div>

    <div id="hub">
        <header>SYS: PHANTOM PRINCE // ACTIVE MONITOR</header>
        
        <div class="viewer">
            <iframe src="s.tradingview.com/widgetembed/?symbol=TVC%3AUSOIL&interval=60&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&theme=dark&style=1&timezone=Etc%2FUTC&studies=%5B%5D&hide_top_toolbar=0&locale=en"></iframe>
        </div>

        <div class="footer-ticker">
            <div class="data-row">THU: 112.06</div>
            <div class="data-row">FRI: 112.25</div>
            <div class="data-row pink">SUN PRINT: 112.65</div>
        </div>
    </div>

    <script>
        function revealHub() {
            // Simply remove the curtain
            document.getElementById('portal').style.display = 'none';
            document.getElementById('hub').style.visibility = 'visible';
        }
    </script>
</body>
</html>
