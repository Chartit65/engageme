<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM PRINCE | WTI TERMINAL</title>
    <style>
        body { 
            background: #000; color: #00FF41; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden; text-transform: uppercase;
        }
        #landing { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .enter-btn { border: 2px solid #00FF41; padding: 20px 40px; color: #00FF41; font-size: 1.5em; cursor: pointer; background: none; }
        #terminal { display: none; flex-direction: column; height: 100vh; }
        header { padding: 15px; border-bottom: 2px solid #00FF41; text-align: center; font-size: 24px; font-weight: bold; }
        
        /* CHART CONTAINER */
        .chart-container { flex-grow: 1; position: relative; background: #000; border-bottom: 2px solid #00FF41; }
        
        .footer-ticker { padding: 20px; background: #050505; }
        .data-row { font-size: 16px; font-weight: bold; margin: 4px 0; }
        .pink { color: #FF00FF; }
        .cyan { color: #00FFFF; }
    </style>
</head>
<body>

    <div id="landing">
        <h1 style="letter-spacing: 15px; font-size: 45px;">PHANTOM PRINCE</h1>
        <button class="enter-btn" onclick="runTerminal()">ENTER TERMINAL</button>
    </div>

    <div id="terminal">
        <header>SYS: PHANTOM PRINCE // LIVE WTI FEED</header>
        
        <div class="chart-container">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
              <div id="tradingview_oil" style="height:100%;width:100%"></div>
              <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
              <script type="text/javascript">
              new TradingView.widget({
                "autosize": true,
                "symbol": "TVC:USOIL",
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_oil"
              });
              </script>
            </div>
            </div>

        <div class="footer-ticker">
            <div class="data-row">THU: 112.06 | FRI: 112.25</div>
            <div class="data-row pink">SUN PRINT: 112.65</div>
            <div class="data-row cyan">LIVE MONITOR: ACTIVE</div>
        </div>
    </div>

    <script>
        function runTerminal() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('terminal').style.display = 'flex';
        }
    </script>
</body>
</html>
