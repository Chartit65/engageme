<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME ANALYTICS | TERMINAL</title>
    <style>
        body {
            background-color: #000000;
            color: #ffb400; /* Bloomberg Amber */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .terminal {
            width: 100%;
            max-width: 900px;
            border: 1px solid #333;
            background-color: #050505;
            padding: 30px;
            box-sizing: border-box;
        }
        .header {
            border-bottom: 2px solid #ffb400;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .sub {
            color: #0068ff; /* Bloomberg Blue */
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        .line {
            margin: 15px 0;
            font-size: 16px;
            line-height: 1.4;
        }
        .cmd {
            color: #00ff88; /* Green */
        }
        .contact-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            border: 1px solid #ffb400;
            color: #ffb400;
            text-decoration: none;
            font-weight: bold;
        }
        .contact-btn:hover {
            background: #ffb400;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="header">
            <h1>ENGAGEME_ANALYTICS</h1>
            <div class="sub">LIQUIDITY_DYNAMICS // DILUTION_MAPPING_V1.0</div>
        </div>

        <div class="line">
            <span class="cmd">>> STATUS:</span> SYSTEM_ACTIVE_STAGING
        </div>
        <div class="line">
            <span class="cmd">>> ARCHITECTURE:</span> HFT MICROSTRUCTURE ENGINE
        </div>
        <div class="line">
            <span class="cmd">>> MONITORING:</span> REAL-TIME EQUITY DILUTION CYCLES
        </div>
        <div class="line">
            <span class="cmd">>> TARGET:</span> INSTITUTIONAL RISK MANAGEMENT TOOLS
        </div>

        <a href="mailto:info@novamulti.com" class="contact-btn">ACCESS_TERMINAL: info@novamulti.com</a>
    </div>

</body>
</html>
