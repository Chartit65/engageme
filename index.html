<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME.LIVE | PHANTOM PRINCE</title>
    <style>
        /* CORE TERMINAL STYLING */
        body, html { 
            margin: 0; padding: 0; 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* TOP STATUS BAR */
        .header-bar { 
            height: 30px;
            border-bottom: 2px solid #00ff41; 
            padding: 5px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 0.9rem;
            background: rgba(0, 255, 65, 0.05);
        }

        /* THE MAIN DATA CENTER (This was the 404 area) */
        #main-frame-container { 
            flex-grow: 1; 
            background: #000; 
            position: relative;
            border-bottom: 2px solid #00ff41;
        }

        /* IFRAME TO PULL YOUR WORKING DATA */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* BOTTOM DATA LOG */
        .terminal-log { 
            height: 150px; 
            padding: 15px; 
            font-size: 0.85rem; 
            overflow-y: auto;
            background: #000;
        }

        .price-line { 
            border-left: 3px solid #00ff41; 
            padding-left: 12px; 
            margin-bottom: 10px; 
        }

        .fuchsia { color: #f0f; border-color: #f0f !important; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #clock { font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-bar">
        <span>SYS: PHANTOM PRINCE | STATUS: SECURE</span>
        <span id="clock">--:--:--</span>
    </div>

    <div id="main-frame-container">
        <iframe src="engageme.live/terminal"></iframe>
    </div>

    <div class="terminal-log">
        <div class="price-line">
            <span style="color:#fff">THU: 112.06</span><br>
            <span style="color:#666; font-size:0.7rem;">[ CLOSING PRINT ]</span>
        </div>
        <div class="price-line">
            <span style="color:#fff">FRI: 112.25</span><br>
            <span style="color:#666; font-size:0.7rem;">[ WEEKEND SETTLE ]</span>
        </div>
        <div class="price-line fuchsia">
            <span style="color:#f0f">SUN: 112.65</span><br>
            <span class="blink" style="color:#f0f; font-size:0.7rem;">[ SUN PRINT INDICATIVE ]</span>
        </div>
        <div class="price-line">
            <span style="color:#00ff41">LIVE: 113.15</span><br>
            <span style="color:#666; font-size:0.7rem;">[ MARKET MAKER STOP HUNT ZONE ]</span>
        </div>
    </div>

    <script>
        // Update the clock every second
        function startClock() {
            const today = new Date();
            document.getElementById('clock').innerHTML = today.toLocaleTimeString();
            setTimeout(startClock, 1000);
        }
        startClock();
    </script>
</body>
</html>
