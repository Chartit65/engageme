<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGAGEME ANALYTICS | LIQUIDITY SYSTEMS</title>
    <style>
        body {
            background-color: #030303;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Sublte deep blue glow - the 'exclusive' look */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(28, 66, 122, 0.12) 0%, transparent 65%);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4.5rem;
            border-radius: 12px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            max-width: 750px;
        }
        .status-badge {
            display: inline-block;
            padding: 0.6rem 1.4rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 3rem;
            color: #aaa;
            font-weight: 500;
        }
        h1 {
            font-size: 3.2rem;
            letter-spacing: -1px;
            margin: 0 0 1.2rem 0;
            font-weight: 700;
            /* Brushed Silver Gradient */
            background: linear-gradient(135deg, #ffffff 20%, #999999 50%, #ffffff 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #999;
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .terminal-log {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            color: #444;
            font-size: 0.8rem;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .contact-btn {
            display: inline-block;
            padding: 1.1rem 3rem;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .contact-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="status-badge">Private Beta // 2026</div>
        <h1>EngageMe Analytics</h1>
        <p>Architecting institutional-grade microstructure engines for real-time liquidity mapping and proprietary equity dilution analysis.</p>
        
        <div class="terminal-log">
            Status: Staging_Systems // Secure_Line_Active
        </div>

        <a href="mailto:info@novamulti.com" class="contact-btn">Request Access</a>
    </div>

</body>
</html>
