<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe | Private Terminal</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #terminal-content { display: none; width: 90%; max-width: 900px; }
        .panel { border: 1px solid #333; padding: 20px; background: #111; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 80%; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-gate" class="panel">
    <h2>FLOOR ACCESS REQUIRED</h2>
    <input type="password" id="passInput" placeholder="ENTER ACCESS CODE...">
    <button onclick="checkPass()">ENTER</button>
</div>

<div id="terminal-content">
    <div class="panel">
        <h1>ENGAGEME.LIVE // LIVE FLOOR</h1>
        <p>SYSTEM STATUS: <span style="color:#00ff41">SECURE</span></p>
        <hr style="border: 0.5px solid #333;">
        <input type="text" id="tickerInput" placeholder="TICKER...">
        <button onclick="processTicker()">SUBMIT</button>
        <div id="log" style="margin-top:20px; height: 200px; overflow: auto; border: 1px solid #222; padding: 10px; font-size: 0.8rem;"></div>
    </div>
</div>

<script>
    const ACCESS_CODE = '26Normandy'; // CHANGE THIS TO YOUR PASSWORD
    const scriptURL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';

    function checkPass() {
        const input = document.getElementById('passInput').value;
        if (input === ACCESS_CODE) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('terminal-content').style.display = 'block';
        } else {
            alert('ACCESS DENIED');
        }
    }

    async function processTicker() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase();
        const log = document.getElementById('log');
        log.innerHTML += `<br>[${new Date().toLocaleTimeString()}] Sending ${ticker} to Floor...`;

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ ticker: ticker }),
                headers: { 'Content-Type': 'application/json' }
            });
            log.innerHTML += `<br><span style="color:white;">[SUCCESS] Data logged.</span>`;
        } catch (e) {
            log.innerHTML += `<br><span style="color:red;">[ERROR] Transmission failed.</span>`;
        }
    }
</script>
</body>
</html>
