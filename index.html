<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe Terminal | Floor Intelligence</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .terminal-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .status-bar { color: #888; font-size: 0.8rem; margin-bottom: 20px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { border: 1px solid #333; padding: 15px; background: #111; }
        h2 { color: #fff; font-size: 1rem; text-transform: uppercase; margin-top: 0; }
        input, button { background: #222; border: 1px solid #00ff41; color: #00ff41; padding: 10px; font-family: inherit; }
        .alert { color: #ff3e3e; font-weight: bold; }
        #log { font-size: 0.9rem; height: 300px; overflow-y: auto; border: 1px solid #222; padding: 10px; background: #000; }
    </style>
</head>
<body>

<div class="terminal-header">
    <h1>ENGAGEME.LIVE // MARKET PLUMBING</h1>
    <div class="status-bar">SYSTEM STATUS: <span id="connection-status">DISCONNECTED</span> | RULES: BNRG_FILTER, POST_SLAUGHTER, CXAI_FLOOR</div>
</div>

<div class="data-grid">
    <div class="panel">
        <h2>Ticker Entry</h2>
        <input type="text" id="tickerInput" placeholder="ENTER TICKER..." autocomplete="off">
        <button onclick="processTicker()">SUBMIT TO FLOOR</button>
        <p id="dilution-warning" class="alert"></p>
    </div>

    <div class="panel">
        <h2>Intelligence Log</h2>
        <div id="log">SYSTEM READY. AWAITING INPUT...</div>
    </div>
</div>

<script>
    // --- CONNECT YOUR PLUMBING HERE ---
    const scriptURL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';
    
    async function processTicker() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase();
        const log = document.getElementById('log');
        
        if (!ticker) return;

        log.innerHTML += `<br>[${new Date().toLocaleTimeString()}] Scanning ${ticker}...`;
        
        // Post-Slaughter & BNRG Filter Check
        log.innerHTML += `<br> > Applying BNRG Filter & CXAI Floor Rules...`;

        try {
            const response = await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Essential for Google Apps Script
                cache: 'no-cache',
                body: JSON.stringify({ ticker: ticker, timestamp: new Date() }),
                headers: { 'Content-Type': 'application/json' }
            });

            log.innerHTML += `<br><span style="color:white;">[SUCCESS] Data transmitted to Google Sheets.</span>`;
            document.getElementById('connection-status').innerText = 'CONNECTED';
            document.getElementById('connection-status').style.color = '#00ff41';
        } catch (error) {
            log.innerHTML += `<br><span class="alert">[ERROR] Floor connection failed.</span>`;
            console.error('Error:', error);
        }
        
        document.getElementById('tickerInput').value = '';
    }
</script>

</body>
</html>
