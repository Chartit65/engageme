<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe.Live Terminal</title>
    <script src="unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #landing-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; z-index: 10; background: #000; position: fixed; }
        h1 { font-size: 3rem; letter-spacing: 5px; }
        .enter-button { background: #007bff; color: #fff; padding: 15px 40px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #terminal-view { display: none; width: 95%; max-width: 1000px; margin-top: 20px; }
        #chart-container { width: 100%; height: 500px; border: 1px solid #333; }
        .controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .t-btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; }
        .t-btn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1>ENGAGEME.LIVE</h1>
        <p style="color: #888;">Advanced Market Intelligence & Astral Data</p>
        <button class="enter-button" onclick="unlockSystem()">ENTER SYSTEM</button>
    </div>

    <div id="terminal-view">
        <div id="status">>> SYSTEM ONLINE: TRACKING SHADOW PRINTS</div>
        <div id="chart-container"></div>
        <div class="controls">
            <button class="t-btn" onclick="updateTimeframe('1M')">1M</button>
            <button class="t-btn" onclick="updateTimeframe('5M')">5M</button>
            <button class="t-btn" onclick="updateTimeframe('1H')">1H</button>
            <button class="t-btn" onclick="updateTimeframe('1D')">1D</button>
        </div>
    </div>

    <script>
        let chart, candlestickSeries;

        function unlockSystem() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('terminal-view').style.display = 'block';
            initChart();
        }

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { backgroundColor: '#000000', textColor: '#00ff00' },
                grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                priceScale: { borderColor: '#333' },
                timeScale: { borderColor: '#333', timeVisible: true }
            });

            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#00ff00', downColor: '#ff0000', borderVisible: false,
                wickUpColor: '#00ff00', wickDownColor: '#ff0000'
            });

            // DATA LOADING Logic
            updateTimeframe('1D');
        }

        function updateTimeframe(tf) {
            // Placeholder Market Data (Thursday) + Sunday Shadow Print
            const data = [
                { time: '2026-04-02', open: 150.00, high: 155.00, low: 149.00, close: 153.00 }, // Thursday
                // Friday/Saturday are empty (Market Closed)
                { time: '2026-04-05', open: 153.00, high: 158.00, low: 152.00, close: 157.00 }, // SUNDAY SHADOW PRINT
            ];
            
            candlestickSeries.setData(data);
            document.getElementById('status').innerText = `>> ${tf} INTERVAL: SHADOW PRINT DETECTED`;
        }
    </script>
</body>
</html>
