<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Intelligence Terminal | Floor Analysis</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { height: 50px; background: #111; border-bottom: 2px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #chart-container { height: calc(100vh - 50px); width: 100%; }
        .controls { display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 5px; text-transform: uppercase; }
        button { background: #00ff00; color: #000; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>

<div id="header">
    <div>SYSTEM STATUS: ACTIVE // DEEP-SYNC ENABLED</div>
    <div class="controls">
        <input type="text" id="tickerInput" placeholder="ENTER TICKER">
        <button onclick="syncData()">SYNC DATA & CHART</button>
    </div>
</div>

<div id="chart-container"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
    const googleUrl = "https://script.google.com/macros/s/AKfycbwcWhXEgq_o7vNiRn09YKxsJCe4QNYPtEs0IU1zX6RB_R3ELJKF7kFUYsKza8mHz1hU/exec";
    let tvWidget = null;

    // This is the "Engine" that builds the chart
    function loadTradingView(symbol, floor, ceiling) {
        // 1. Wipe the container clean to force a fresh reload
        document.getElementById("chart-container").innerHTML = "";

        tvWidget = new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "container_id": "chart-container"
        });

        // 2. WAIT for the chart to finish loading before drawing lines
        tvWidget.onChartReady(() => {
            console.log("Chart ready. Drawing indicators...");
            
            // Draw Green Floor
            if (floor) {
                tvWidget.chart().createShape({
                    price: floor,
                    shape: 'horizontal_line',
                    lock: true,
                    overrides: { linecolor: '#00ff00', linewidth: 3, showLabel: true, text: "FLOOR: " + floor }
                });
            }

            // Draw Purple Ceiling
            if (ceiling) {
                tvWidget.chart().createShape({
                    price: ceiling,
                    shape: 'horizontal_line',
                    lock: true,
                    overrides: { linecolor: '#ff00ff', linewidth: 2, showLabel: true, text: "CEILING: " + ceiling }
                });
            }
        });
    }

    // Load initial chart
    window.onload = () => loadTradingView("NASDAQ:TPET", 0, 0);

    async function syncData() {
        const ticker = document.getElementById('tickerInput').value.toUpperCase().trim();
        if (!ticker) return alert("Enter ticker.");

        try {
            let response = await fetch(googleUrl);
            let data = await response.json();

            // Auto-Add Logic
            if (!data[ticker]) {
                alert(`ADDING ${ticker} TO SPREADSHEET...`);
                await fetch(`${googleUrl}?add=${ticker}`, { mode: 'no-cors' });
                await new Promise(res => setTimeout(res, 2500)); 
                response = await fetch(googleUrl);
                data = await response.json();
            }

            const info = data[ticker];
            if (info) {
                // This triggers the full reload and line drawing
                loadTradingView(ticker, parseFloat(info.floor), parseFloat(info.ceiling));
            }
        } catch (err) {
            console.error("Sync Error:", err);
            alert("Sync Failed. Check Script Permissions.");
        }
    }
</script>

</body>
</html>
