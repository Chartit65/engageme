<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>engagement.live | Functional Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .content-wrapper {
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        /* Styling for the 'live' part to match your blue preference */
        h1 span {
            color: #007bff; 
        }

        .mission {
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            color: #bbbbbb;
            margin-bottom: 40px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-button {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 18px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px; /* More "functional/tool" feel than rounded */
            transition: all 0.2s ease;
            border: 1px solid #007bff;
        }

        .cta-button:hover {
            background-color: transparent;
            color: #007bff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>engage me<span>.live</span></h1>
        <p class="mission">Functional Tools for the Real World</p>
        
        <a href="#" class="cta-button">Access Tools</a>
    </div>

</body>
</html>
