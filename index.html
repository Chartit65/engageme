<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngageMe Terminal</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 50px;
        }
        #terminal {
            width: 90%;
            max-width: 800px;
            border: 2px solid #0f0;
            padding: 20px;
            box-shadow: 0 0 20px #0f0;
            background: #050505;
        }
        canvas {
            width: 100%;
            height: 400px;
            border-bottom: 1px solid #0f0;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
    </style>
</head>

        </div>
    </div>
