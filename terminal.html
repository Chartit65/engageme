<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL | SHADOW PRINTS</title>
    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; }
        .status-bar { color: #00ff00; font-family: monospace; padding: 10px; font-size: 14px; }
        #chart-area { width: 100vw; height: calc(100vh - 40px); }
    </style>
</head>
<body>
    <div class="status-bar">>> SYSTEM ONLINE: TRACKING SHADOW PRINTS</div>
    
    <div id="chart-area">
        <div id="tv-widget-container" style="height: 100%;"></div>
    </div>

    <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "NASDAQ:CXAI",
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "tv-widget-container"
        });
    </script>
</body>
</html>
