<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTI SHADOW TERMINAL</title>
    <script src="unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        .terminal-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #0a0a0a;
            border-bottom: 2px solid #222;
            color: #007bff;
        }

        .title { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; margin: 0; }
        .status { text-align: right; }
        .online { color: #00ff41; font-weight: bold; font-size: 1rem; }
        
        /* THE CHART BOX */
        #chart-viewport { 
            flex-grow: 1; 
            width: 100%; 
            background: #000;
        }

        .exit-link { color: #444; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="terminal-wrapper">
        <div class="header">
            <div>
                <h1 class="title">WTI SHADOW TERMINAL</h1>
                <a href="index.html" class="exit-link">← TERMINATE SESSION</a>
            </div>
            <div class="status">
                <div class="online">SYSTEM STATUS: ONLINE</div>
                <div style="color: #555; font-size: 0.8rem;">SHADOW DATA FEED ACTIVE</div>
            </div>
        </div>

        <div id="chart-viewport"></div>
    </div>

    <script>
        // Ensure the chart waits for the library to load
        window.onload = function() {
            const chartElement = document.getElementById('chart-viewport');
            
            const chart = LightweightCharts.createChart(chartElement, {
                width: chartElement.clientWidth,
                height: chartElement.clientHeight,
                layout: {
                    backgroundColor: '#000000',
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#111' },
                    horzLines: { color: '#111' },
                },
                timeScale: {
                    borderColor: '#333',
                    timeVisible: true,
                },
            });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff41', downColor: '#ff4949', 
                borderVisible: false,
                wickUpColor: '#00ff41', wickDownColor: '#ff4949',
            });

            // DATA MATCHING YOUR PHOTO: $84.37 Low to $112.06 Close
            candleSeries.setData([
                { time: '2026-03-18', open: 94.20, high: 96.50, low: 93.80, close: 95.10 },
                { time: '2026-03-20', open: 95.10, high: 98.20, low: 94.10, close: 95.80 },
                { time: '2026-03-24', open: 92.40, high: 94.00, low: 84.37, close: 88.20 },
                { time: '2026-03-27', open: 88.20, high: 99.40, low: 88.10, close: 98.20 },
                { time: '2026-03-31', open: 98.20, high: 105.50, low: 98.00, close: 104.50 },
                { time: '2026-04-02', open: 104.50, high: 112.07, low: 104.20, close: 112.06 }
            ]);

            // PHANTOM PRINT: Saturday @ 112.50
            candleSeries.createPriceLine({
                price: 112.50,
                color: 'cyan',
                lineWidth: 3,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: 'PHANTOM TARGET',
            });

            // TARGET MARKER
            candleSeries.setMarkers([
                {
                    time: '2026-04-02',
                    position: 'aboveBar',
                    color: 'cyan',
                    shape: 'arrowDown',
                    text: 'TARGET: $112.50'
                }
            ]);

            // Fix for window resizing
            window.addEventListener('resize', () => {
                chart.applyOptions({ 
                    width: chartElement.clientWidth, 
                    height: chartElement.clientHeight 
                });
            });
        };
    </script>
</body>
</html>
