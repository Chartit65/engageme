<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Oil Monitor</title>
    <style>
        /* This is the visual engine - no external files needed */
        body { background: black; color: #00FF00; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        #header { border-bottom: 2px solid #f0f; color: #f0f; padding-bottom: 10px; margin-bottom: 40px; font-weight: bold; }
        
        /* The Chart Frame */
        #chart-frame { 
            position: relative; 
            width: 90%; 
            height: 300px; 
            border-left: 2px solid #00FF00; 
            border-bottom: 2px solid #00FF00; 
            margin: 20px auto;
        }

        /* The Data Points */
        .dot { 
            position: absolute; 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            transform: translate(-50%, 50%); 
        }
        .market { background: #00FF00; box-shadow: 0 0 10px #00FF00; } /* Green */
        .phantom { background: #f0f; box-shadow: 0 0 10px #f0f; } /* Pink */

        /* Labels */
        .label { position: absolute; font-size: 12px; color: #00FF00; }
        .price { left: -50px; width: 40px; text-align: right; }
        .date { bottom: -30px; white-space: nowrap; }
    </style>
</head>
<body>
    <div id="header">PHANTOM PRINCE OIL MONITOR // PROTOCOL: ACTIVE</div>

    <div id="chart-frame">
        <div class="label price" style="top: 0%;">115.00</div>
        <div class="label price" style="top: 50%;">112.50</div>
        <div class="label price" style="top: 100%;">110.00</div>

        <div class="dot market" style="left: 20%; bottom: 41%;"></div>
        <div class="label date" style="left: 20%;">FRI (CL)</div>

        <div class="dot phantom" style="left: 50%; bottom: 50%;"></div>
        <div class="label date" style="left: 50%;">SAT (P)</div>

        <div class="dot phantom" style="left: 80%; bottom: 66%;"></div>
        <div class="label date" style="left: 80%;">SUN (P)</div>
    </div>

    <div style="margin-top: 80px; border: 1px solid #333; padding: 10px;">
        <p style="color: #00FF00; margin: 5px 0;">> DATA ORIGIN: PHANTOM SCANNER</p>
        <p style="color: #f0f; margin: 5px 0;">> LATEST PRINT: $112.65</p>
        <p style="color: #f0f; margin: 5px 0;">> STATUS: MONITORING WEEKEND DRIFT</p>
    </div>
</body>
</html>
