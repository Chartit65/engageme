<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTI SHADOW TERMINAL</title>
    <script src="cdnjs.cloudflare.com/ajax/libs/lightweight-charts/3.8.0/lightweight-charts.standalone.production.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        .terminal-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .header { background: #0a0a0a; border-bottom: 2px solid #222; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .title { color: #007bff; font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; margin: 0; }
        .status { color: #00ff41; font-size: 0.8rem; font-weight: bold; text-align: right; }
        
        .timeframe-bar { background: #111; padding: 10px 20px; border-bottom: 1px solid #222; display: flex; gap: 25px; height: 40px; align-items: center; }
        .tf-btn { color: #555; cursor: pointer; font-size: 0.9rem; font-weight: bold; padding: 5px 10px; }
        .tf-btn:hover { color: #007bff; }
        .tf-btn.active { color: #007bff; border-bottom: 2px solid #007bff; }

        /* FORCED DIMENSIONS FOR THE CHART BOX */
        #chart-box { 
            width: 100%; 
            height: calc(100vh - 100px); 
            background: #050505; 
        }
        .exit-link { color: #444; text-decoration: none; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header">
            <div>
                <h1 class="title">WTI SHADOW TERMINAL</h1>
                <a href="index.html" class="exit-link">← EXIT SESSION</a>
            </div>
            <div class="status">● SHADOW FEED ACTIVE</div>
        </div>

        <div class="timeframe-bar" id="tf-selector">
            <div class="tf-btn" onclick="updateView(this, '1m')">1m</div>
            <div class="tf-btn" onclick="updateView(this, '5m')">5m</div>
            <div class="tf-btn" onclick="updateView(this, '15m')">15m</div>
            <div class="tf-btn active" onclick="updateView(this, '1H')">1H</div>
            <div class="tf-btn" onclick="updateView(this, '4H')">4H</div>
            <div class="tf-btn" onclick="updateView(this, 'D')">D</div>
        </div>

        <div id="chart-box"></div>
    </div>

    <script>
        let chart;
        let candleSeries;

        function createChart() {
            const chartDiv = document.getElementById('chart-box');
            // Clean up if it exists
            chartDiv.innerHTML = '';

            chart = LightweightCharts.createChart(chartDiv, {
                width: chartDiv.clientWidth,
                height: chartDiv.clientHeight,
                layout: { backgroundColor: '#000000', textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                leftPriceScale: { visible: true, borderColor: '#333' },
                rightPriceScale: { visible: false },
                timeScale: { borderColor: '#333', timeVisible: true },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff41', downColor: '#ff4949', 
                borderVisible: false, wickUpColor: '#00ff41', wickDownColor: '#ff4949',
                priceScaleId: 'left',
            });

            // LOAD DATA
            const mainData = [
                { time: '2026-03-24', open: 92.40, high: 94.00, low: 84.37, close: 88.20 },
                { time: '2026-03-31', open: 98.20, high: 105.50, low: 98.00, close: 104.50 },
                { time: '2026-04-02', open: 104.50, high: 112.07, low: 104.20, close: 112.06 },
                { time: '2026-04-04', open: 112.06, high: 113.10, low: 112.40, close: 112.50, color: 'cyan', wickColor: 'cyan' }
            ];

            candleSeries.setData(mainData);

            candleSeries.createPriceLine({
                price: 112.50, color: 'cyan', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: 'PHANTOM'
            });

            chart.timeScale().fitContent();
        }

        function updateView(element, tf) {
            // Update UI
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            
            // Re-draw to force browser update
            chart.timeScale().fitContent();
        }

        // STARTUP
        window.onload = createChart;

        window.onresize = () => {
            if(chart) {
                const chartDiv = document.getElementById('chart-box');
                chart.applyOptions({ width: chartDiv.clientWidth, height: chartDiv.clientHeight });
            }
        };
    </script>
</body>
</html>
