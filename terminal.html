<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM ONLINE | SHADOW PRINTS</title>
    <style>
        body { background-color: #000; margin: 0; padding: 0; overflow: hidden; color: #00ff00; font-family: monospace; }
        .header { padding: 10px; height: 30px; border-bottom: 1px solid #222; }
        #tradingview-wrapper { height: calc(100vh - 55px); width: 100%; }
    </style>
</head>
<body>

    <div class="header">>> SYSTEM ONLINE: TRACKING SHADOW PRINTS</div>

    <div id="tradingview-wrapper">
        <div class="tradingview-widget-container" style="height:100%;width:100%;">
            <div id="tradingview_chart" style="height:100%;width:100%;"></div>
            <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
                "autosize": true,
                "symbol": "NASDAQ:CXAI",
                "interval": "5",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
            </script>
        </div>
    </div>

</body>
</html>
