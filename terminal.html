<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTI SHADOW TERMINAL</title>
    <script src="unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            color: #007bff; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* HEADER AREA */
        .terminal-header {
            height: 80px;
            width: 100%;
            background: #0a0a0a;
            border-bottom: 2px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .title { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; margin: 0; }
        .online-status { color: #00ff41; font-weight: bold; text-align: right; }
        .exit-link { color: #444; text-decoration: none; font-size: 0.8rem; display: block; }

        /* THE CHART AREA - FORCED SIZE */
        #chart-area { 
            width: 100vw; 
            height: calc(100vh - 80px); 
            background: #111; /* Failsafe color so you can see the box */
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <div>
            <h1 class="title">WTI SHADOW TERMINAL</h1>
            <a href="index.html" class="exit-link">← TERMINATE SESSION</a>
        </div>
        <div class="online-status">
            <div>● SYSTEM ONLINE</div>
            <div style="color: #555; font-size: 0.7rem; letter-spacing: 1px;">SHADOW DATA ACTIVE</div>
        </div>
    </div>

    <div id="chart-area"></div>

    <script>
        // Use a small delay to ensure the div is ready
        setTimeout(() => {
            const chartDiv = document.getElementById('chart-area');
            
            // Create the Chart
            const chart = LightweightCharts.createChart(chartDiv, {
                width: chartDiv.clientWidth,
                height: chartDiv.clientHeight,
                layout: {
                    backgroundColor: '#000000',
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { color: '#111' },
                    horzLines: { color: '#111' },
                },
                timeScale: {
                    borderColor: '#333',
                    timeVisible: true,
                },
            });

            const candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff41', downColor: '#ff4949', 
                borderVisible: false,
                wickUpColor: '#00ff41', wickDownColor: '#ff4949',
            });

            // DATA FROM YOUR PHOTO: $84.37 Low to $112.06 Close
            candleSeries.setData([
                { time: '2026-03-20', open: 96.20, high: 98.20, low: 94.10, close: 95.80 },
                { time: '2026-03-24', open: 92.40, high: 94.00, low: 84.37, close: 88.20 },
                { time: '2026-03-27', open: 88.20, high: 99.40, low: 88.10, close: 98.20 },
                { time: '2026-03-31', open: 98.20, high: 105.50, low: 98.00, close: 104.50 },
                { time: '2026-04-02', open: 104.50, high: 112.07, low: 104.20, close: 112.06 }
            ]);

            // PHANTOM TARGET LINE (The Dashed Cyan Level)
            candleSeries.createPriceLine({
                price: 112.50,
                color: 'cyan',
                lineWidth: 3,
                lineStyle: 1, // Dashed
                axisLabelVisible: true,
                title: 'PHANTOM PRINT',
            });

            // Target Arrow
            candleSeries.setMarkers([
                {
                    time: '2026-04-02',
                    position: 'aboveBar',
                    color: 'cyan',
                    shape: 'arrowDown',
                    text: 'PHANTOM: $112.50'
                }
            ]);

            // Handle browser resizing
            window.onresize = function() {
                chart.applyOptions({ 
                    width: chartDiv.clientWidth, 
                    height: chartDiv.clientHeight 
                });
            };
        }, 500); // 500ms delay to ensure DOM is ready
    </script>
</body>
</html>
