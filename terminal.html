<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM ONLINE: TRACKING SHADOW PRINTS</title>
    <style>
        body { background-color: #000; color: #00ff00; font-family: monospace; margin: 0; padding: 20px; }
        .header { margin-bottom: 20px; font-size: 1.2em; }
        #chart_container { width: 100%; height: 80vh; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">>> SYSTEM ONLINE: TRACKING SHADOW PRINTS</div>

    <div id="chart_container"></div>

    <script type="text/javascript" src="s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "NASDAQ:CXAI",
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "save_image": false,
            "container_id": "chart_container"
        });
    </script>

</body>
</html>
